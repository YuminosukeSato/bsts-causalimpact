name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.10 3.11 3.12 3.13
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  smoke-test-wheels:
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist
      - name: Install built wheel
        shell: python
        run: |
          import glob
          import subprocess
          import sys

          wheels = glob.glob("dist/*.whl")
          assert wheels, "No wheel artifact downloaded"
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheels[0]])
      - name: Smoke test wheel
        shell: python
        run: |
          import numpy as np
          import pandas as pd
          from causal_impact import CausalImpact, ModelOptions

          dates = pd.date_range("2020-01-01", periods=24, freq="D")
          x = np.linspace(0.0, 1.0, 24)
          y = 5.0 + 0.2 * np.arange(24) + 1.5 * x
          y[18:] += 2.0
          data = pd.DataFrame({"y": y, "x1": x}, index=dates)

          ci = CausalImpact(
              data,
              ["2020-01-01", "2020-01-18"],
              ["2020-01-19", "2020-01-24"],
              model_args=ModelOptions(niter=100, nwarmup=50, seed=42),
          )
          assert ci.summary()
          assert len(ci.inferences.columns) >= 11

  publish:
    needs: [build-sdist, smoke-test-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
