name: Numerical Equivalence

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 2 * * 1'  # weekly Monday 02:00 UTC

jobs:
  # Job 1: fast test with committed fixtures (no R required)
  equivalence-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install uv && uv sync --all-extras
      - name: Run numerical equivalence tests
        run: .venv/bin/pytest tests/test_numerical_equivalence.py -v --tb=short

  # Job 2: weekly fixture regeneration (R required)
  regenerate-fixtures:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('CausalImpact','jsonlite'), repos='https://cloud.r-project.org')"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install uv && uv sync --all-extras
      - name: Regenerate R fixtures
        run: Rscript scripts/generate_r_reference.R
      - name: Run equivalence tests with fresh fixtures
        run: .venv/bin/pytest tests/test_numerical_equivalence.py -v --tb=short
